<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【NEUTRINO】黄埔軍魂/Soul of Whampoa（東北きりたん・琴葉茜）</title>
    <style>
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .video-container {
            position: relative;
            background: #000;
        }
        video {
            width: 100%;
            height: auto;
            display: block;
        }
        .title {
            padding: 15px 20px;
            font-size: 22px;
            font-weight: bold;
            color: #333;
            border-bottom: 1px solid #eee;
        }
        .controls-info {
            padding: 15px 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">【NEUTRINO】黄埔軍魂/Soul of Whampoa（東北きりたん・琴葉茜）</div>
        <div class="video-container">
            <video id="myVideo" controls autoplay muted>
                <!-- 这里替换成你的视频地址 -->
                <source src="./黄埔军魂.mp4" type="video/mp4">
                <!-- 支持更多格式（可选） -->
                <source src="你的视频地址.webm" type="video/webm">
                <source src="你的视频地址.ogg" type="video/ogg">
                您的浏览器不支持视频播放。
            </video>
        </div>
        <div class="controls-info">
            <strong>使用说明：</strong><br>
            • 点击视频区域或使用空格键播放/暂停<br>
            • 滚动鼠标滚轮调节音量<br>
            • 全屏播放按 F 键或点击右下角全屏按钮
        </div>
    </div>

    <script>
        const video = document.getElementById('myVideo');

        // 自动尝试播放（部分浏览器需要用户交互）
        video.addEventListener('click', () => {
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
        });

        // 键盘快捷键支持
        document.addEventListener('keydown', (e) => {
            if (e.key === " " || e.key === "k" || e.key === "K") {  // 空格或 K 键 播放/暂停
                e.preventDefault();
                if (video.paused) video.play();
                else video.pause();
            }
            if (e.key === "f" || e.key === "F") {  // F 键全屏
                if (!document.fullscreenElement) {
                    video.requestFullscreen();
                } else {
                    document.exitFullscreen();
                }
            }
        });
    </script>
</body>
</html>
